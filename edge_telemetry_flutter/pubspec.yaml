name: edge_telemetry_flutter
description: Real User Monitoring and telemetry package for Flutter, performance tracking, and local reporting.
version: 2.0.0
homepage: https://github.com/NCG-Africa/edge_telemetry_flutter
repository: https://github.com/NCG-Africa/edge_telemetry_flutter

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  device_info_plus: ^11.5.0
  package_info_plus: ^8.3.0
  connectivity_plus: ^6.1.4
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Test-only: fake the docs dir so the OfflineQueue disk seam runs on a temp dir.
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0

flutter:
  plugin:
    platforms:
      # Native crash capture (#27 iOS MetricKit, #28 Android). On any platform
      # without a registered handler, drainNativeCrashes() no-ops via
      # MissingPluginException (see NativeCrashChannel).
      ios:
        pluginClass: EdgeTelemetryFlutterPlugin
      # Android (#28): JVM UncaughtExceptionHandler (all APIs) + ApplicationExitInfo
      # native/ANR (API 30+). Pre-30 native/ANR is a documented gap surfaced via
      # sdk.native_capture_tier.
      android:
        package: com.ncgafrica.edge_telemetry_flutter
        pluginClass: EdgeTelemetryFlutterPlugin
